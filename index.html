<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintOps ERP</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:'JetBrains Mono','Consolas','Courier New',monospace;}
body{background:#020617;color:#e2e8f0;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#334155;border-radius:99px;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.4)brightness(1.5);cursor:pointer;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:.3;}
select option{background:#1e293b;color:#e2e8f0;}
/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:0 16px;}
.main{max-width:1200px;margin:0 auto;padding:20px 16px 96px;}
@media(min-width:640px){.main{padding-bottom:32px;}}
/* Header */
.hdr{position:sticky;top:0;z-index:40;background:rgba(2,6,23,.97);backdrop-filter:blur(10px);border-bottom:1px solid #1e293b;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ico{background:#10b981;padding:8px;border-radius:8px;display:flex;color:#020617;}
.logo-t{font-size:14px;font-weight:700;color:#f1f5f9;line-height:1.}
.logo-s{font-size:10px;color:#475569;margin-top:2px;}
.hdr-acts{display:flex;gap:8px;align-items:center;}
.hide-sm{display:none;}@media(min-width:480px){.hide-sm{display:inline;}}
/* Sync badge */
.sync-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;border:1px solid #1e293b;background:#0f172a;font-size:10px;color:#64748b;}
.dot{width:7px;height:7px;border-radius:50%;background:#334155;flex-shrink:0;transition:background .4s;}
.dot.live{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.5);}
.dot.warn{background:#f59e0b;}
.dot.err{background:#f87171;}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn-em{background:#10b981;color:#020617;}.btn-em:hover{background:#34d399;}.btn-em:active{transform:scale(.97);}
.btn-out{background:transparent;color:#64748b;border:1px solid #334155;}.btn-out:hover{color:#e2e8f0;border-color:#64748b;}
.btn-ico{background:transparent;border:none;cursor:pointer;padding:4px;color:#334155;transition:color .15s;display:inline-flex;align-items:center;}
.btn-ico.edit:hover{color:#60a5fa;} .btn-ico.del:hover{color:#f87171;}
.btn-danger{background:transparent;color:#f87171;border:1px solid rgba(248,113,113,.35);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}.btn-danger:hover{background:rgba(248,113,113,.08);}
/* Nav */
.tab-nav{display:none;}@media(min-width:640px){.tab-nav{display:flex;}}
.tab-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;border-bottom:2px solid transparent;color:#475569;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:#94a3b8;}.tab-btn.on{border-bottom-color:#10b981;color:#10b981;}
.mob-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(2,6,23,.97);backdrop-filter:blur(10px);border-top:1px solid #1e293b;display:flex;}
@media(min-width:640px){.mob-nav{display:none;}}
.mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#334155;cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s;}
.mob-btn.on{color:#10b981;}
/* Cards */
.card{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(min-width:1024px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;padding:16px;display:flex;align-items:flex-start;justify-content:space-between;}
.kpi-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:700;line-height:1.2;}.kpi-sub{font-size:10px;color:#475569;margin-top:3px;}
.kpi-ico{padding:8px;border-radius:8px;background:#1e293b;flex-shrink:0;margin-left:8px;display:flex;}
/* Table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:500;color:#64748b;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;padding:10px 12px;text-align:left;border-bottom:1px solid #1e293b;}
td{font-size:12px;padding:9px 12px;border-bottom:1px solid rgba(30,41,59,.5);vertical-align:middle;}
.tr-c{cursor:pointer;transition:background .12s;}.tr-c:hover{background:rgba(30,41,59,.35);}
.tr-c.exp{background:rgba(30,41,59,.45);}.tr-exp{background:rgba(15,23,42,.4);}
/* Badge */
.bdg{font-size:10px;padding:2px 8px;border-radius:99px;display:inline-block;font-family:inherit;}
.bdg-s{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.3);}
.bdg-f{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);}
.bdg-d{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
/* Section */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;}
.sec-ttl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;}
/* Form */
.lbl{display:block;font-size:10px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;}
.inp{width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
.inp:focus{border-color:#10b981;box-shadow:0 0 0 2px rgba(16,185,129,.12);}.inp::placeholder{color:#475569;}textarea.inp{resize:none;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:480px){.g3{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}}
.mb{margin-bottom:12px;}.fc{display:flex;flex-direction:column;gap:12px;}
/* Modal */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:640px){.modal-bg{align-items:center;padding:16px;}}
.modal-box{background:#020617;border:1px solid #334155;width:100%;max-height:94vh;display:flex;flex-direction:column;overflow:hidden;border-radius:16px 16px 0 0;}
@media(min-width:640px){.modal-box{max-width:900px;border-radius:16px;}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;flex-shrink:0;}
.modal-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#e2e8f0;}
.pulse{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite;display:inline-block;flex-shrink:0;}
.pulse.edit-mode{background:#60a5fa;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.modal-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.modal-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.modal-side{width:235px;flex-shrink:0;border-left:1px solid #1e293b;padding:16px;display:none;overflow-y:auto;}
@media(min-width:768px){.modal-side{display:block;}}
.sub-tabs{display:flex;border-bottom:1px solid #1e293b;flex-shrink:0;}
.sub-tab{flex:1;padding:10px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:#475569;font-family:inherit;transition:all .15s;}
.sub-tab:hover{color:#94a3b8;}.sub-tab.on{color:#10b981;border-bottom-color:#10b981;background:rgba(16,185,129,.04);}
.modal-scroll{flex:1;overflow-y:auto;padding:16px;}
.mob-bar{padding:8px 16px;flex-shrink:0;border-top:1px solid #1e293b;}@media(min-width:768px){.mob-bar{display:none;}}
.modal-ftr{display:flex;gap:12px;padding:12px 16px;border-top:1px solid #1e293b;flex-shrink:0;}
.m-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid #334155;background:transparent;color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-family:inherit;transition:all .15s;}.m-cancel:hover{color:#e2e8f0;border-color:#64748b;}
.m-save{flex:1;padding:10px;border-radius:10px;border:none;background:#10b981;color:#020617;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.m-save:hover{background:#34d399;}.m-save:active{transform:scale(.97);}
.m-save.edit-save{background:#3b82f6;}.m-save.edit-save:hover{background:#60a5fa;}
.sts-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:10px;border:1px solid #334155;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;background:transparent;color:#475569;}
.sts-btn:hover{border-color:#64748b;}.sts-s{background:rgba(16,185,129,.1);border-color:#10b981;color:#34d399;}.sts-f{background:rgba(248,113,113,.1);border-color:#f87171;color:#f87171;}
.qc-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid #334155;font-size:11px;font-family:inherit;cursor:pointer;text-align:left;transition:all .15s;background:transparent;color:#475569;width:100%;}
.qc-btn:hover{border-color:#64748b;color:#94a3b8;}.qc-on{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.4);color:#6ee7b7;}
.strat-btn{padding:12px;border-radius:10px;border:1px solid #334155;text-align:center;cursor:pointer;transition:all .15s;background:transparent;flex:1;font-family:inherit;}
/* Odometer */
.odo-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px;}
@media(min-width:640px){.odo-grid{grid-template-columns:1fr 1fr;}}@media(min-width:1024px){.odo-grid{grid-template-columns:1fr 1fr 1fr;}}
.odo-card{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;padding:16px;}
/* Filters */
.fltr-btn{padding:8px 12px;border-radius:8px;border:1px solid #334155;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;background:transparent;color:#475569;font-family:inherit;transition:all .15s;}
.fltr-btn:hover{border-color:#64748b;color:#94a3b8;}.fltr-btn.on{background:rgba(16,185,129,.1);border-color:#10b981;color:#34d399;}
/* Maintenance */
.maint-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;background:rgba(30,41,59,.15);border-bottom:1px solid #1e293b;}
@media(min-width:640px){.maint-grid{grid-template-columns:repeat(3,1fr);}}
/* Settings */
.sett-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}@media(min-width:640px){.sett-grid{grid-template-columns:repeat(3,1fr);}}
.mw2{max-width:680px;display:flex;flex-direction:column;gap:16px;}
/* Expand row */
.exp-det{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px;font-size:11px;}
@media(min-width:640px){.exp-det{grid-template-columns:repeat(4,1fr);}}
.det-hd{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
/* Misc */
.warn-box{margin-top:12px;padding:12px;border-radius:8px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);font-size:11px;color:rgba(245,158,11,.7);line-height:1.6;}
.chip{display:flex;align-items:center;justify-content:space-between;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
/* Firebase banner */
.fb-setup{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:16px;margin-bottom:20px;}
.fb-setup-title{color:#fbbf24;font-size:13px;font-weight:700;margin-bottom:8px;}
.fb-setup-body{color:#94a3b8;font-size:12px;line-height:1.8;}
.fb-setup-body code{background:#1e293b;padding:2px 7px;border-radius:4px;color:#34d399;font-size:11px;}
.fb-setup-body a{color:#34d399;}
.fb-setup-body strong{color:#fbbf24;}
/* Step list */
.steps{margin-top:8px;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:4px;}
.step{display:flex;align-items:flex-start;gap:8px;}
.step-n{background:#1e293b;color:#10b981;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
/* Loading */
.loading{position:fixed;inset:0;z-index:100;background:rgba(2,6,23,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading.gone{display:none;}
.loader{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:12px;color:#e2e8f0;display:flex;align-items:center;gap:8px;transition:opacity .3s;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.gone{opacity:0;pointer-events:none;}
/* Edit banner in modal */
.edit-banner{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#93c5fd;display:flex;align-items:center;gap:8px;}
</style>

<body>

<!-- Loading screen -->
<div id="loading" class="loading">
  <div class="loader"></div>
  <p style="font-size:11px;color:#475569;letter-spacing:.15em;">CONNECTING TO FIREBASE…</p>
  <p style="font-size:10px;color:#334155;" id="loading-sub">d-manager-5afba-default-rtdb</p>
</div>

<!-- Toast notification -->
<div id="toast" class="toast gone"></div>

<div id="root"></div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  FIREBASE CONFIG                                             ║
// ║  ─────────────────────────────────────────────────────────  ║
// ║  3 values needed. Get them here (30 seconds):               ║
// ║  console.firebase.google.com/project/d-manager-5afba        ║
// ║    → Gear icon → Project settings → General                 ║
// ║    → Scroll to "Your apps" → Web app → SDK snippet          ║
// ║    → Copy apiKey, messagingSenderId, appId                   ║
// ║                                                              ║
// ║  DATABASE RULES (Realtime Database → Rules tab):            ║
// ║  { "rules": { ".read": true, ".write": true } }             ║
// ╚══════════════════════════════════════════════════════════════╝
const FB = {
  apiKey:            "AIzaSyCuTqTslHUEZ3buyw0crkbJO34-Kyn5yHo",
  authDomain:        "d-manager-5afba.firebaseapp.com",
  databaseURL:       "https://d-manager-5afba-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "d-manager-5afba",
  storageBucket:     "d-manager-5afba.firebasestorage.app",
  messagingSenderId: "606784177437",
  appId:             "1:606784177437:web:43257354f856692fd70df4",
};

// ─── Firebase runtime ─────────────────────────────────────────
let db = null, fbLive = false, fbOK = false, skipNext = false;

function fbInit() {
  const needsSetup = FB.apiKey === 'PASTE_API_KEY_HERE';
  if (needsSetup) {
    hideLoading('local');
    return;
  }
  try {
    firebase.initializeApp(FB);
    db = firebase.database();

    // Connection monitor
    db.ref('.info/connected').on('value', snap => {
      fbLive = snap.val() === true;
      fbOK   = true;
      updateDot();
    });

    // Real-time listener — fires on ANY change from EITHER device
    db.ref('/').on('value', snap => {
      if (skipNext) { skipNext = false; return; }
      const d = snap.val() || {};
      if (d.prints)      S.prints      = Object.values(d.prints).sort((a,b)=>b.id-a.id);
      if (d.maintenance) S.maintenance = Object.values(d.maintenance).sort((a,b)=>b.id-a.id);
      if (d.settings)    S.settings    = {...DEF_SET, ...d.settings};
      cacheLocal();
      hideLoading('firebase');
      render();
    }, err => {
      console.error('FB read:', err);
      hideLoading('error');
      render();
    });

    // Timeout fallback — show app after 4s even if Firebase is slow
    setTimeout(() => hideLoading('timeout'), 4000);

  } catch(e) {
    console.error('FB init:', e);
    hideLoading('error');
  }
}

function fbWrite() {
  if (!db) return;
  const po = {}, mo = {};
  S.prints.forEach(p      => { po[p.id] = p; });
  S.maintenance.forEach(m => { mo[m.id] = m; });
  skipNext = true;
  db.ref('/').set({
    prints:      Object.keys(po).length ? po : null,
    maintenance: Object.keys(mo).length ? mo : null,
    settings:    S.settings,
  }).catch(e => {
    skipNext = false;
    console.error('FB write:', e);
    toast('⚠ Firebase write failed — check DB rules', 'err');
  });
}

function updateDot() {
  document.querySelectorAll('.sync-dot').forEach(d => {
    d.className = 'dot sync-dot ' + (fbLive ? 'live' : fbOK ? 'warn' : 'err');
    d.title = fbLive ? 'Live — synced with Firebase' : 'Reconnecting…';
  });
}

let loadingHidden = false;
function hideLoading(reason) {
  if (loadingHidden) return;
  loadingHidden = true;
  const el = document.getElementById('loading');
  if (el) el.classList.add('gone');
  if (reason === 'local')   render();
  if (reason === 'timeout') render();
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  if (!el) return;
  const color = type==='err' ? '#f87171' : type==='warn' ? '#fbbf24' : '#34d399';
  el.innerHTML = `<span style="color:${color};">●</span> ${msg}`;
  el.classList.remove('gone');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.add('gone'), 3000);
}

// ═══════════════════════════════════════════════════════════════
// INLINE SVG ICONS
// ═══════════════════════════════════════════════════════════════
const IC = {
  layers:    `<svg width="W" height="H" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  activity:  `<svg width="W" height="H" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  clock:     `<svg width="W" height="H" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  trending:  `<svg width="W" height="H" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  plus:      `<svg width="W" height="H" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  download:  `<svg width="W" height="H" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,

// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function cacheLocal() {
  localStorage.setItem(SK, JSON.stringify({prints:S.prints, maintenance:S.maintenance, settings:S.settings}));
}
function hydrate() {
  try {
    const d = JSON.parse(localStorage.getItem(SK)||'{}');
    if (d.prints)      S.prints      = d.prints;
    if (d.maintenance) S.maintenance = d.maintenance;
    if (d.settings)    S.settings    = {...DEF_SET, ...d.settings};
  } catch(e) {}
}
function persist() {
  cacheLocal();
  fbWrite();
}

// ═══════════════════════════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════════════════════════
function calc(p, s) {
  const w=+p.materialWeight||0, sp=+p.spoolPrice||0, sw=+p.spoolWeight||1000;
  const h=+p.printTimeHours||0, lh=+p.laborHours||0, pk=+(p.packagingCost??s.packagingCost)||0;
  const st = STRATS.find(x=>x.key===p.pricingStrategy) || STRATS[1];
  const fil=w*(sp/sw), elec=h*(s.estimatedWatts/1000)*s.kwhRate, wear=h*s.depreciationRate;
  const lab=lh*s.laborRate, base=fil+elec+wear, taxed=base*(1+s.failureTax/100);
  const sug=taxed*st.mult+lab+pk, actual=+p.actualSalePrice||0, cost=base+lab+pk;
  const profit=actual-cost, margin=actual>0?(profit/actual)*100:0;
  return {fil,elec,wear,lab,base,taxed,sug,cost,profit,margin};
}

function exportCSV() {
  const s=S.settings, cu=s.currency;
  const h=['Date','Project','Version','Printer','Customer','Source','Qty','Status','Failure','Material','Brand','Color','Weight_g','LayerH','Infill%','NozzleT','BedT','PrintHrs','LaborHrs','FilCost','ElecCost','WearCost','LaborCost','BaseCost','Suggested','ActualSale','NetProfit','Margin%','ShipWeight','Tracking','DateOrdered','DateShipped','Notes'];
  const rows=S.prints.map(p=>{const c=calc(p,s);return[p.date,p.projectName,p.fileVersion,p.printerName,p.customerName,p.orderSource,p.quantity||1,p.status,p.failureReason,p.material,p.materialBrand,p.materialColor,p.materialWeight,p.layerHeight,p.infill,p.nozzleTemp,p.bedTemp,p.printTimeHours,p.laborHours,c.fil.toFixed(2),c.elec.toFixed(2),c.wear.toFixed(2),c.lab.toFixed(2),c.base.toFixed(2),c.sug.toFixed(2),p.actualSalePrice||'',c.profit.toFixed(2),c.margin.toFixed(1),p.shippingWeight,p.trackingNumber,p.dateOrdered,p.dateShipped,p.notes];});
  const csv=[h,...rows].map(r=>r.map(v=>`"${v??''}"`).join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:`printops_${Date.now()}.csv`});
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV downloaded — '+S.prints.length+' records');
}

function lbl(label, inner) { return `<div><label class="lbl">${label}</label>${inner}</div>`; }
function fi(id, label, type='text', val='', extra='', ph='') {
  const fk = id.replace('f-','');
  return lbl(label, `<input id="${id}" class="inp" type="${type}" value="${esc(val)}" placeholder="${esc(ph)}" oninput="S.form['${fk}']=this.value;refreshPrev()" ${extra}>`);
}
function fsel(id, label, opts, val='', onchange='') {
  const fk = id.replace('f-','');
  const cb = onchange || `S.form['${fk}']=this.value;refreshPrev()`;
  const os = opts.map(([v,l])=>`<option value="${esc(v)}" ${v===val?'selected':''}>${esc(l||v)}</option>`).join('');
  return lbl(label, `<select id="${id}" class="inp" onchange="${cb}">${os}</select>`);
}

function renderPreview(form, settings) {

  const rows=[['Filament',c.fil],['Electricity',c.elec],['Machine Wear',c.wear],[`Failure Tax (${settings.failureTax}%)`,c.taxed-c.base],['Labor',c.lab],['Packaging',+(form.packagingCost)||settings.packagingCost]];
  let o=`<p class="lbl" style="margin-bottom:12px;">Live Cost Preview</p>`;
  o+=rows.map(([k,v])=>`<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:11px;color:#64748b;">${k}</span><span style="font-size:12px;color:#cbd5e1;">${cv}${v.toFixed(2)}</span></div>`).join('');
  o+=`<div style="border-top:1px solid #1e293b;padding-top:8px;margin-top:4px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:#cbd5e1;font-weight:700;">Suggested (${st.label} ${st.mult}×)</span><span style="font-size:14px;font-weight:700;color:${st.col};">${cv}${c.sug.toFixed(2)}</span></div>`;

  }
  return o;
}

  syncDOM();

      <div class="g2 mb">${fi('f-projectName','Project Name','text',form.projectName,'','e.g. Vase #7')}${fi('f-fileVersion','File Version','text',form.fileVersion,'','v1.0')}</div>
      <div class="g2 mb">${fi('f-customerName','Customer Name','text',form.customerName,'','Name or order ref')}${fsel('f-orderSource','Order Source',[['','Select source'],...ORDER_SRC.map(s=>[s,s])],form.orderSource)}</div>
      <div class="g3 mb">${fsel('f-printerName','Printer',prOpts,form.printerName)}${fi('f-quantity','Quantity','number',form.quantity,'min="1" step="1"','1')}${fi('f-dateOrdered','Date Ordered','date',form.dateOrdered)}</div>
      <div class="mb">
        <label class="lbl">Print Status</label>
        <div style="display:flex;gap:8px;">
          <button class="sts-btn ${form.status==='success'?'sts-s':''}" onclick="toggleStatus('success')">${ic('check',14)} Success</button>
          <button class="sts-btn ${form.status==='failure'?'sts-f':''}" onclick="toggleStatus('failure')">${ic('xcircle',14)} Failure</button>
        </div>
      </div>
      ${form.status==='failure'
        ?`<div class="mb">${fsel('f-failureReason','Reason for Failure',[['','Select reason'],...FAIL_WHY.map(r=>[r,r])],form.failureReason)}</div>`
        :`<div class="mb"><label class="lbl">QC Checklist</label><div class="g2" style="gap:8px;">${QC_LIST.map(item=>`<button class="qc-btn ${form.qcChecks.includes(item)?'qc-on':''}" onclick="toggleQC('${esc(item)}')" type="button">${ic('check',11)} ${esc(item)}</button>`).join('')}</div></div>`}
      ${lbl('Notes',`<textarea id="f-notes" class="inp" rows="2" placeholder="Customer requests, special instructions…" oninput="S.form.notes=this.value">${esc(form.notes)}</textarea>`)}`;

  } else if(modalTab==='specs'){
    body=`${editBanner}
      <div class="g3 mb">${fi('f-layerHeight','Layer Height (mm)','number',form.layerHeight,'step="0.05"')}${fi('f-infill','Infill (%)','number',form.infill)}${fi('f-printTimeHours','Print Time (hrs)','number',form.printTimeHours,'step="0.25"')}</div>
      <div class="g2 mb">${fi('f-nozzleTemp','Nozzle Temp (°C)','number',form.nozzleTemp)}${fi('f-bedTemp','Bed Temp (°C)','number',form.bedTemp)}</div>
      <div class="g2 mb">${fi('f-printSpeed','Print Speed (mm/s)','number',form.printSpeed)}${fi('f-fanSpeed','Fan Speed (%)','number',form.fanSpeed)}</div>
      <div class="g3 mb">${fsel('f-material','Material Type',MATS.map(m=>[m,m]),form.material)}${fi('f-materialBrand','Brand','text',form.materialBrand,'','e.g. Bambu')}${fi('f-materialColor','Color','text',form.materialColor,'','e.g. Matte Black')}</div>
      <div class="g3 mb">${fi('f-materialWeight','Used Weight (g)','number',form.materialWeight)}${fi('f-spoolPrice',`Spool Price (${c})`,'number',form.spoolPrice)}${fi('f-spoolWeight','Spool Weight (g)','number',form.spoolWeight)}</div>
      ${fi('f-laborHours','Labor / Post-Processing Hours','number',form.laborHours,'step="0.25"','Design, post-proc, QC hours')}`;

  } else if(modalTab==='costs'){
    body=`${editBanner}
      <div class="mb">
        <label class="lbl">Pricing Strategy</label>
        <div style="display:flex;gap:8px;">${STRATS.map(st=>`<button class="strat-btn" onclick="setStrat('${st.key}')" type="button" style="${form.pricingStrategy===st.key?`border-color:${st.col};background:${st.col}15;`:''}"><div style="font-size:22px;font-weight:700;color:${form.pricingStrategy===st.key?st.col:'#4b5563'};font-family:inherit;">${st.mult}×</div><div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:${form.pricingStrategy===st.key?st.col:'#374151'};font-family:inherit;">${st.label}</div></button>`).join('')}</div>
      </div>
      <div class="g2">${fi('f-actualSalePrice',`Actual Sale Price (${c})`,'number',form.actualSalePrice,'','What did customer pay?')}${fi('f-packagingCost',`Packaging Cost (${c})`,'number',form.packagingCost)}</div>`;

  } else if(modalTab==='ship'){
    body=`${editBanner}
      <div class="g2 mb">${fi('f-shippingWeight','Shipping Weight (g)','number',form.shippingWeight)}${fi('f-trackingNumber','Tracking Number','text',form.trackingNumber,'','e.g. TH123456789')}</div>
      ${fi('f-dateShipped','Date Shipped','date',form.dateShipped)}`;
  }

  return `<div class="sub-tabs">${tabs.map(([k,l])=>`<button class="sub-tab ${modalTab===k?'on':''}" onclick="setMTab('${k}')">${l}</button>`).join('')}</div><div class="modal-scroll">${body}</div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const {prints,settings}=S, c=cu();
  const succ=prints.filter(p=>p.status==='success');
  const rate=prints.length>0?(succ.length/prints.length)*100:0;
  const gram=prints.reduce((a,p)=>a+(+p.materialWeight||0),0);
  const pending=prints.filter(p=>!p.dateShipped&&p.status==='success').length;
  const profit=prints.reduce((a,p)=>!p.actualSalePrice?a:a+calc(p,settings).profit,0);
  const recent=[...prints].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  const kpis=[
    {icon:'activity',label:'Success Rate',value:`${rate.toFixed(1)}%`,sub:`${succ.length} of ${prints.length} jobs`,color:'#34d399'},
    {icon:'layers',label:'Filament Used',value:`${(gram/1000).toFixed(2)}kg`,sub:`${gram.toFixed(0)}g total`,color:'#60a5fa'},
    {icon:'clock',label:'Pending Orders',value:pending,sub:'Awaiting shipment',color:'#fbbf24'},
    {icon:'trending',label:'Net Profit',value:`${c}${profit.toFixed(0)}`,sub:'Completed sales',color:profit>=0?'#34d399':'#f87171'},
  ];
  return `
    ${renderSetupBanner()}
    <div class="kpi-grid">${kpis.map(k=>`<div class="kpi"><div style="min-width:0;"><p class="kpi-lbl">${k.label}</p><p class="kpi-val" style="color:${k.color};">${k.value}</p><p class="kpi-sub">${k.sub}</p></div><div class="kpi-ico" style="color:${k.color};">${ic(k.icon,16)}</div></div>`).join('')}</div>
    <div class="card">
      <div class="sec-hdr"><p class="sec-ttl">Recent Print Jobs</p><button class="btn btn-em" onclick="openModal()">${ic('plus',11)} New Print</button></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Date</th><th>Project</th><th>Printer</th><th>Status</th><th>Cost</th><th>Sale</th><th>Profit</th><th style="width:64px;"></th></tr></thead>
        <tbody>
          ${!recent.length
            ?`<tr><td colspan="8" style="text-align:center;color:#334155;padding:40px;">No prints logged yet — click New Print to start!</td></tr>`
            :recent.map(p=>{const r=calc(p,settings);return`<tr>
              <td style="color:#64748b;white-space:nowrap;">${p.date}</td>
              <td style="color:#e2e8f0;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.projectName)||'—'}</td>
              <td style="color:#64748b;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.printerName)||'—'}</td>
              <td>${bdg(p.status)}</td>
              <td style="color:#94a3b8;">${c}${r.base.toFixed(0)}</td>
              <td style="color:#cbd5e1;">${p.actualSalePrice?`${c}${p.actualSalePrice}`:'—'}</td>
              <td style="color:${p.actualSalePrice?(r.profit>=0?'#34d399':'#f87171'):'#334155'};font-weight:700;">${p.actualSalePrice?`${r.profit>=0?'+':''}${c}${r.profit.toFixed(0)}`:'—'}</td>
              <td style="white-space:nowrap;">
                <button class="btn-ico edit" onclick="openModal(${p.id})" title="Edit">${ic('edit',13)}</button>
                <button class="btn-ico del"  onclick="delPrint(${p.id})" title="Delete">${ic('trash',13)}</button>
              </td>
            </tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: LOG ROWS
// ═══════════════════════════════════════════════════════════════
function renderLogRows() {
  const {prints,settings,logSearch,logFilter,logExpanded}=S, c=cu();
  const list=[...prints]
    .filter(p=>logFilter==='all'||p.status===logFilter)
    .filter(p=>!logSearch||[p.projectName,p.customerName,p.printerName,p.material,p.orderSource,p.materialColor,p.materialBrand].join(' ').toLowerCase().includes(logSearch.toLowerCase()))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(!list.length) return `<tr><td colspan="12" style="text-align:center;color:#334155;padding:40px;">No matching records.</td></tr>`;

  return list.map(p=>{
    const r=calc(p,settings), exp=logExpanded===p.id;
    return `
      <tr class="tr-c ${exp?'exp':''}" onclick="toggleExpand(${p.id})">
        <td style="color:#64748b;white-space:nowrap;">${p.date}</td>
        <td style="color:#e2e8f0;font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.projectName)||'—'}</td>
        <td style="color:#64748b;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.customerName)||'—'}</td>
        <td style="color:#64748b;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.printerName)||'—'}</td>
        <td style="color:#94a3b8;">${esc(p.material)}${p.materialColor?` / ${esc(p.materialColor)}`:''}</td>
        <td style="color:#94a3b8;text-align:right;">${p.quantity||1}</td>
        <td style="color:#64748b;text-align:right;white-space:nowrap;">${p.printTimeHours}h</td>
        <td>${bdg(p.status)}</td>
        <td style="color:#94a3b8;white-space:nowrap;">${c}${r.base.toFixed(0)}</td>
        <td style="color:#cbd5e1;white-space:nowrap;">${p.actualSalePrice?`${c}${p.actualSalePrice}`:'—'}</td>
        <td style="color:${p.actualSalePrice?(r.profit>=0?'#34d399':'#f87171'):'#334155'};font-weight:700;white-space:nowrap;">${p.actualSalePrice?`${r.profit>=0?'+':''}${c}${r.profit.toFixed(0)}`:'—'}</td>
        <td style="white-space:nowrap;">
          <button class="btn-ico edit" onclick="event.stopPropagation();openModal(${p.id})" title="Edit this record">${ic('edit',13)}</button>
          <button class="btn-ico del"  onclick="event.stopPropagation();delPrint(${p.id})" title="Delete">${ic('trash',13)}</button>
        </td>
      </tr>
      ${exp ? `<tr class="tr-exp"><td colspan="12"><div class="exp-det">
        <div>
          <p class="det-hd">Tech Specs</p>
          <p style="color:#94a3b8;margin-bottom:3px;">Layer: <span style="color:#cbd5e1;">${p.layerHeight}mm</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Infill: <span style="color:#cbd5e1;">${p.infill}%</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Nozzle: <span style="color:#cbd5e1;">${p.nozzleTemp}°C</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Bed: <span style="color:#cbd5e1;">${p.bedTemp}°C</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Speed: <span style="color:#cbd5e1;">${p.printSpeed}mm/s</span></p>
          <p style="color:#94a3b8;">Brand: <span style="color:#cbd5e1;">${esc(p.materialBrand)||'—'}</span></p>
        </div>
        <div>
          <p class="det-hd">Cost Breakdown</p>
          <p style="color:#94a3b8;margin-bottom:3px;">Filament: <span style="color:#cbd5e1;">${c}${r.fil.toFixed(2)}</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Electricity: <span style="color:#cbd5e1;">${c}${r.elec.toFixed(2)}</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Wear: <span style="color:#cbd5e1;">${c}${r.wear.toFixed(2)}</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Labor: <span style="color:#cbd5e1;">${c}${r.lab.toFixed(2)}</span></p>
          <p style="color:#34d399;margin-top:6px;font-weight:700;">Margin: ${r.margin.toFixed(1)}%</p>
        </div>
        <div>
          <p class="det-hd">Order Info</p>
          <p style="color:#94a3b8;margin-bottom:3px;">Quantity: <span style="color:#cbd5e1;">${p.quantity||1}</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Source: <span style="color:#cbd5e1;">${esc(p.orderSource)||'—'}</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Ordered: <span style="color:#cbd5e1;">${p.dateOrdered||'—'}</span></p>
          <p style="color:#94a3b8;margin-bottom:3px;">Shipped: <span style="color:${p.dateShipped?'#34d399':'#fbbf24'};">${p.dateShipped||'Pending'}</span></p>
          ${p.trackingNumber?`<p style="color:#94a3b8;margin-bottom:3px;">Track: <span style="color:#60a5fa;">${esc(p.trackingNumber)}</span></p>`:''}
          <p style="color:#94a3b8;">Strategy: <span style="color:#cbd5e1;">${esc(p.pricingStrategy)}</span></p>
        </div>
        <div>
          <p class="det-hd">${p.status==='success'?'QC Checks':'Failure Info'}</p>
          ${p.status==='success'
            ?(p.qcChecks||[]).length?(p.qcChecks||[]).map(q=>`<p style="color:#34d399;margin-bottom:2px;">✓ ${esc(q)}</p>`).join(''):`<p style="color:#334155;">No QC checks logged</p>`
            :`<p style="color:#f87171;">${esc(p.failureReason)||'Reason not specified'}</p>`}
          ${p.notes?`<p style="color:#64748b;margin-top:8px;font-style:italic;">"${esc(p.notes)}"</p>`:''}
        </div>
      </div></td></tr>` : ''}`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// RENDER: MAINTENANCE
// ═══════════════════════════════════════════════════════════════
function renderMaintenance() {
  const {prints,maintenance,settings,showMF,mf}=S, c=cu();
  const odos=settings.printers.map(pr=>{
    const hrs=prints.filter(p=>p.printerName===pr).reduce((a,p)=>a+(+p.printTimeHours||0),0);
    const jobs=prints.filter(p=>p.printerName===pr).length;
    const fail=prints.filter(p=>p.printerName===pr&&p.status==='failure').length;
    const last=maintenance.filter(m=>m.printerName===pr).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    return {pr,hrs,jobs,fail,last};
  }).filter(o=>o.jobs>0||o.last);

  const sorted=[...maintenance].sort((a,b)=>new Date(b.date)-new Date(a.date));
  return `
    <div class="odo-grid">
      ${!odos.length
        ?`<div class="odo-card" style="grid-column:1/-1;text-align:center;color:#334155;padding:32px;">Log your first print job to see printer odometers here.</div>`
        :odos.map(o=>`<div class="odo-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <div style="min-width:0;"><p class="lbl">Printer Odometer</p><p style="font-size:14px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(o.pr)}</p></div>
            <span style="color:#334155;flex-shrink:0;margin-left:8px;">${ic('printer',15)}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;text-align:center;">
            <div><p style="font-size:22px;font-weight:700;color:#34d399;">${o.hrs.toFixed(1)}</p><p class="lbl" style="text-align:center;">Hours</p></div>
            <div><p style="font-size:22px;font-weight:700;color:#60a5fa;">${o.jobs}</p><p class="lbl" style="text-align:center;">Jobs</p></div>
            <div><p style="font-size:22px;font-weight:700;color:#f87171;">${o.fail}</p><p class="lbl" style="text-align:center;">Fails</p></div>
          </div>
          <div style="border-top:1px solid #1e293b;padding-top:10px;font-size:10px;color:#475569;">${o.last?`Last: <span style="color:#94a3b8;">${esc(o.last.type)}</span> — ${o.last.date}`:'No maintenance yet'}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="sec-hdr"><p class="sec-ttl">Maintenance Log</p><button class="btn ${showMF?'btn-out':'btn-em'}" onclick="toggleMF()">${showMF?`${ic('x',11)} Cancel`:`${ic('plus',11)} Log Service`}</button></div>
      ${showMF?`<div class="maint-grid">
        ${lbl('Printer',`<select id="mf-printerName" class="inp"><option value="">Select printer</option>${settings.printers.map(p=>`<option value="${esc(p)}" ${p===mf.printerName?'selected':''}>${esc(p)}</option>`).join('')}</select>`)}
        ${lbl('Service Type',`<select id="mf-type" class="inp"><option value="">Select type</option>${MAINT_T.map(t=>`<option value="${esc(t)}" ${t===mf.type?'selected':''}>${esc(t)}</option>`).join('')}</select>`)}
        ${lbl('Date',`<input id="mf-date" class="inp" type="date" value="${mf.date}">`)}
        ${lbl(`Part Cost (${c})`,`<input id="mf-partCost" class="inp" type="number" value="${mf.partCost}">`)}
        <div style="grid-column:1/-1;">${lbl('Notes / Details',`<input id="mf-notes" class="inp" placeholder="e.g. 0.4mm hardened steel nozzle at 600h" value="${esc(mf.notes)}">`)}</div>
        <div style="grid-column:1/-1;"><button class="btn btn-em" style="width:100%;padding:10px;border-radius:10px;justify-content:center;" onclick="saveMaint()">Save Maintenance Record</button></div>
      </div>`:''}
      <div class="tbl-wrap"><table>
        <thead><tr><th>Date</th><th>Printer</th><th>Service</th><th>Part Cost</th><th>Notes</th><th></th></tr></thead>
        <tbody>${!sorted.length
          ?`<tr><td colspan="6" style="text-align:center;color:#334155;padding:40px;">No maintenance records yet.</td></tr>`
          :sorted.map(m=>`<tr><td style="color:#64748b;">${m.date}</td><td style="color:#e2e8f0;">${esc(m.printerName)}</td><td><span class="bdg bdg-d">${esc(m.type)||'—'}</span></td><td style="color:#fbbf24;">${+m.partCost>0?`${c}${m.partCost}`:'—'}</td><td style="color:#64748b;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.notes)||'—'}</td><td><button class="btn-ico del" onclick="delMaint(${m.id})">${ic('trash',12)}</button></td></tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
}

function renderSettings() {
  const {settings}=S, c=cu();
  const isConfigured = FB.apiKey !== 'PASTE_API_KEY_HERE';
  const statusColor = !isConfigured?'#f59e0b':fbLive?'#10b981':'#f87171';
  const statusText  = !isConfigured?'Not configured — local only':fbLive?'● Live — synced with Firebase':'○ Reconnecting…';
  return `<div class="mw2">

    <!-- Firebase Card -->
    <div class="card" style="padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <p class="lbl" style="margin:0;">Firebase Realtime Database</p>
        <span style="font-size:11px;color:${statusColor};">${statusText}</span>
      </div>
      <div style="background:#1e293b;border-radius:8px;padding:12px;font-size:11px;line-height:1.8;color:#64748b;">
        <div style="display:flex;justify-content:space-between;"><span>Project</span><span style="color:#cbd5e1;">d-manager-5afba</span></div>
        <div style="display:flex;justify-content:space-between;"><span>Database URL</span><span style="color:#cbd5e1;font-size:10px;">…default-rtdb.firebaseio.com</span></div>
        <div style="display:flex;justify-content:space-between;"><span>Prints stored</span><span style="color:#34d399;">${S.prints.length}</span></div>
        <div style="display:flex;justify-content:space-between;"><span>Maintenance logs</span><span style="color:#34d399;">${S.maintenance.length}</span></div>
      </div>
      ${!isConfigured?`<div class="warn-box" style="margin-top:10px;">To activate sync, paste your <code style="background:#1e293b;padding:1px 5px;border-radius:4px;color:#34d399;">apiKey</code>, <code style="background:#1e293b;padding:1px 5px;border-radius:4px;color:#34d399;">messagingSenderId</code>, and <code style="background:#1e293b;padding:1px 5px;border-radius:4px;color:#34d399;">appId</code> into the <strong>FB</strong> config at the top of this HTML file.<br><a href="https://console.firebase.google.com/project/d-manager-5afba/settings/general" target="_blank" style="color:#34d399;">→ Open Firebase Project Settings</a></div>`:''}
    </div>

    <!-- Cost Rates -->
    <div class="card" style="padding:16px;">
      <p class="lbl" style="margin-bottom:16px;">Cost Rates &amp; Defaults</p>
      <div class="sett-grid">
        ${lbl(`Labor Rate (${c}/hr)`,        `<input id="s-laborRate"        class="inp" type="number" value="${settings.laborRate}">`)}
        ${lbl(`Electricity (${c}/kWh)`,       `<input id="s-kwhRate"          class="inp" type="number" step="0.1" value="${settings.kwhRate}">`)}
        ${lbl('Printer Watts (est.)',          `<input id="s-estimatedWatts"   class="inp" type="number" value="${settings.estimatedWatts}">`)}
        ${lbl(`Depreciation (${c}/hr)`,       `<input id="s-depreciationRate" class="inp" type="number" step="0.5" value="${settings.depreciationRate}">`)}
        ${lbl('Failure Tax Buffer (%)',        `<input id="s-failureTax"       class="inp" type="number" value="${settings.failureTax}">`)}
        ${lbl(`Default Packaging (${c})`,     `<input id="s-packagingCost"    class="inp" type="number" value="${settings.packagingCost}">`)}
      </div>
      <div class="warn-box">⚠ Failure Tax (${settings.failureTax}%) is automatically added to every suggested price so good prints cover the cost of bad ones.</div>
    </div>

    <!-- Printers -->
    <div class="card" style="padding:16px;">
      <p class="lbl" style="margin-bottom:12px;">Registered Printers</p>
      <div>${settings.printers.map(p=>`<div class="chip"><div style="display:flex;align-items:center;gap:8px;">${ic('printer',13)}<span style="font-size:13px;color:#cbd5e1;">${esc(p)}</span></div><button class="btn-ico del" onclick="removePrinter('${esc(p)}')">${ic('x',13)}</button></div>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:4px;"><input id="new-printer" class="inp" placeholder="Add custom printer model…" onkeydown="if(event.key==='Enter')addPrinter()" style="flex:1;"><button class="btn btn-em" onclick="addPrinter()" style="padding:8px 12px;">${ic('plus',14)}</button></div>
    </div>

    <button id="sav-btn" class="btn btn-em" onclick="saveSettings()" style="padding:12px;border-radius:10px;width:100%;justify-content:center;font-size:12px;">${ic('save',15)} Save Settings to Firebase</button>

    <div class="card" style="padding:16px;">
      <p class="lbl" style="margin-bottom:4px;">Danger Zone</p>
      <p style="font-size:11px;color:#475569;margin-bottom:12px;">This deletes all data from Firebase AND this device permanently.</p>
      <button class="btn-danger" onclick="clearAll()">Delete All Data Everywhere</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: MODAL
// ═══════════════════════════════════════════════════════════════
function renderModal() {
  if(!S.showModal) return '';
  const isEdit = !!S.editId;
  const saveClass = isEdit ? 'm-save edit-save' : 'm-save';
  return `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-hdr">
          <div class="modal-title">
            <span class="pulse ${isEdit?'edit-mode':''}"></span>
            ${isEdit ? `Edit Print Record` : 'New Print Job'}
          </div>
          <button class="btn-ico" onclick="closeModal()" style="color:#64748b;">${ic('x',15)}</button>
        </div>
        <div class="modal-layout">
          <div class="modal-main"><div id="modal-content">${renderModalContent()}</div></div>
          <div class="modal-side"><div id="preview-panel">${renderPreview(S.form,S.settings)}</div></div>
        </div>
        <div class="mob-bar"><div id="mob-bar-inner"></div></div>
        <div class="modal-ftr">
          <button class="m-cancel" onclick="closeModal()">Cancel</button>
          <button class="${saveClass}" onclick="savePrint()">${ic('save',13)} ${isEdit?'Update Record':'Save Print Job'}</button>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: FULL APP
// ═══════════════════════════════════════════════════════════════
const TABS = [
  {k:'dashboard',   l:'Dashboard', ico:'grid'},
  {k:'log',         l:'Log',       ico:'log'},
  {k:'maintenance', l:'Service',   ico:'wrench'},
  {k:'settings',    l:'Settings',  ico:'cog'},
];

function render() {
  const t=S.tab;
  const dotCls = 'dot sync-dot ' + (fbLive ? 'live' : FB.apiKey==='PASTE_API_KEY_HERE' ? 'warn' : 'err');
  const dotTip = fbLive ? 'Live — Firebase connected' : FB.apiKey==='PASTE_API_KEY_HERE' ? 'Firebase not configured' : 'Reconnecting…';
  const syncLabel = fbLive ? 'Live' : FB.apiKey==='PASTE_API_KEY_HERE' ? 'Local' : 'Offline';

  document.getElementById('root').innerHTML = `
    <header class="hdr">
      <div class="wrap">
        <div class="hdr-row">
          <div class="logo">
            <div class="logo-ico">${ic('layers',15)}</div>
            <div><div class="logo-t">PrintOps ERP</div><div class="logo-s">3D Print Management</div></div>
          </div>
          <div class="hdr-acts">
            <div class="sync-badge">${ic('wifi',11)} <span class="${dotCls}" title="${dotTip}"></span> <span class="hide-sm">${syncLabel}</span></div>
            <button class="btn btn-out" onclick="exportCSV()">${ic('download',12)} <span class="hide-sm">CSV</span></button>
            <button class="btn btn-em" onclick="openModal()">${ic('plus',12)} <span class="hide-sm">New Print</span></button>
          </div>
        </div>
        <div class="tab-nav">${TABS.map(x=>`<button class="tab-btn ${t===x.k?'on':''}" onclick="setTab('${x.k}')">${ic(x.ico,13)} ${x.l}</button>`).join('')}</div>
      </div>
    </header>

    <main class="main">
      ${t==='dashboard'   ? renderDashboard()   : ''}
      ${t==='log'         ? renderLog()         : ''}
      ${t==='maintenance' ? renderMaintenance() : ''}
      ${t==='settings'    ? renderSettings()    : ''}
    </main>

    <nav class="mob-nav">${TABS.map(x=>`<button class="mob-btn ${t===x.k?'on':''}" onclick="setTab('${x.k}')">${ic(x.ico,20)}<span>${x.l}</span></button>`).join('')}</nav>

    ${renderModal()}
  `;

  if(S.showModal) refreshPrev();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
hydrate();       // Instant local data load
render();        // First paint immediately
fbInit();        // Connect Firebase in background
</script>
</body>
</html>
