<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintOps ERP</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:'JetBrains Mono','Consolas','Courier New',monospace;}
body{background:#020617;color:#e2e8f0;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#334155;border-radius:99px;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.4)brightness(1.5);cursor:pointer;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:.3;}
select option{background:#1e293b;color:#e2e8f0;}
/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:0 16px;}
.main{max-width:1200px;margin:0 auto;padding:20px 16px 96px;}
@media(min-width:640px){.main{padding-bottom:32px;}}
/* Header */
.hdr{position:sticky;top:0;z-index:40;background:rgba(2,6,23,.97);backdrop-filter:blur(10px);border-bottom:1px solid #1e293b;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ico{background:#10b981;padding:8px;border-radius:8px;display:flex;color:#020617;}
.logo-t{font-size:14px;font-weight:700;color:#f1f5f9;line-height:1;}
.logo-s{font-size:10px;color:#475569;margin-top:2px;}
.hdr-acts{display:flex;gap:6px;align-items:center;}
.hide-sm{display:none;}@media(min-width:480px){.hide-sm{display:inline;}}
.sync-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;border:1px solid #1e293b;background:#0f172a;font-size:10px;color:#64748b;}
.dot{width:7px;height:7px;border-radius:50%;background:#334155;flex-shrink:0;transition:background .4s;}
.dot.live{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.5);}
.dot.warn{background:#f59e0b;}.dot.err{background:#f87171;}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn-em{background:#10b981;color:#020617;}.btn-em:hover{background:#34d399;}.btn-em:active{transform:scale(.97);}
.btn-out{background:transparent;color:#64748b;border:1px solid #334155;}.btn-out:hover{color:#e2e8f0;border-color:#64748b;}
.btn-sm{padding:5px 10px;font-size:10px;}
.btn-ico{background:transparent;border:none;cursor:pointer;padding:4px;color:#334155;transition:color .15s;display:inline-flex;align-items:center;}
.btn-ico.edit:hover{color:#60a5fa;}.btn-ico.del:hover{color:#f87171;}.btn-ico.ok:hover{color:#34d399;}
.btn-danger{background:transparent;color:#f87171;border:1px solid rgba(248,113,113,.35);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}.btn-danger:hover{background:rgba(248,113,113,.08);}
/* Nav */
.tab-nav{display:none;}@media(min-width:640px){.tab-nav{display:flex;}}
.tab-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;border-bottom:2px solid transparent;color:#475569;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:#94a3b8;}.tab-btn.on{border-bottom-color:#10b981;color:#10b981;}
.mob-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(2,6,23,.97);backdrop-filter:blur(10px);border-top:1px solid #1e293b;display:flex;}
@media(min-width:640px){.mob-nav{display:none;}}
.mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:#334155;cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s;}
.mob-btn.on{color:#10b981;}
/* Cards */
.card{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(min-width:1024px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;padding:16px;display:flex;align-items:flex-start;justify-content:space-between;}
.kpi-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:700;line-height:1.2;}.kpi-sub{font-size:10px;color:#475569;margin-top:3px;}
.kpi-ico{padding:8px;border-radius:8px;background:#1e293b;flex-shrink:0;margin-left:8px;display:flex;}
/* Table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:500;color:#64748b;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;padding:9px 10px;text-align:left;border-bottom:1px solid #1e293b;}
td{font-size:12px;padding:9px 10px;border-bottom:1px solid rgba(30,41,59,.5);vertical-align:middle;}
.tr-c{cursor:pointer;transition:background .12s;}.tr-c:hover{background:rgba(30,41,59,.3);}
.tr-c.exp{background:rgba(30,41,59,.45);}.tr-exp{background:rgba(15,23,42,.4);}
/* Badge */
.bdg{font-size:10px;padding:2px 7px;border-radius:99px;display:inline-block;}
.bdg-s{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.3);}
.bdg-f{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);}
.bdg-d{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
.bdg-b{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.3);}
.bdg-y{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.serial{font-size:10px;color:#475569;font-weight:700;}
.lot-tag{font-size:10px;color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);padding:1px 6px;border-radius:4px;}
/* Section */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;}
.sec-ttl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;}
/* Form */
.lbl{display:block;font-size:10px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;}
.inp{width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
.inp:focus{border-color:#10b981;box-shadow:0 0 0 2px rgba(16,185,129,.12);}.inp::placeholder{color:#475569;}textarea.inp{resize:none;}
/* Material select special */
.mat-select{position:relative;}
.mat-sel-row{display:flex;gap:6px;align-items:flex-end;}
.mat-preview{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#6ee7b7;margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
@media(max-width:520px){.g3{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}.g4{grid-template-columns:1fr 1fr;}}
.mb{margin-bottom:12px;}.fc{display:flex;flex-direction:column;gap:12px;}
/* Divider */
.div-label{font-size:10px;color:#334155;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:8px;margin:14px 0 10px;}
.div-label::before,.div-label::after{content:'';flex:1;height:1px;background:#1e293b;}
/* Modal */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:640px){.modal-bg{align-items:center;padding:16px;}}
.modal-box{background:#020617;border:1px solid #334155;width:100%;max-height:94vh;display:flex;flex-direction:column;overflow:hidden;border-radius:16px 16px 0 0;}
@media(min-width:640px){.modal-box{max-width:960px;border-radius:16px;}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;flex-shrink:0;}
.modal-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#e2e8f0;}
.pulse{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite;display:inline-block;flex-shrink:0;}
.pulse.edit-pulse{background:#60a5fa;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.modal-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.modal-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.modal-side{width:250px;flex-shrink:0;border-left:1px solid #1e293b;overflow-y:auto;display:none;}
@media(min-width:800px){.modal-side{display:block;}}
.sub-tabs{display:flex;border-bottom:1px solid #1e293b;flex-shrink:0;}
.sub-tab{flex:1;padding:9px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:#475569;font-family:inherit;transition:all .15s;}
.sub-tab:hover{color:#94a3b8;}.sub-tab.on{color:#10b981;border-bottom-color:#10b981;background:rgba(16,185,129,.04);}
.modal-scroll{flex:1;overflow-y:auto;padding:16px;}
.mob-bar{padding:8px 16px;flex-shrink:0;border-top:1px solid #1e293b;}@media(min-width:800px){.mob-bar{display:none;}}
.modal-ftr{display:flex;gap:12px;padding:12px 16px;border-top:1px solid #1e293b;flex-shrink:0;}
.m-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid #334155;background:transparent;color:#64748b;font-size:12px;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .15s;}.m-cancel:hover{color:#e2e8f0;border-color:#64748b;}
.m-save{flex:1;padding:10px;border-radius:10px;border:none;background:#10b981;color:#020617;font-size:12px;font-weight:700;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.m-save:hover{background:#34d399;}.m-save:active{transform:scale(.97);}.m-save.edit-save{background:#3b82f6;}.m-save.edit-save:hover{background:#60a5fa;}
/* Cost preview */
.prev-section{margin-bottom:12px;}
.prev-head{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#334155;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #1e293b;}
.prev-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prev-k{font-size:11px;color:#64748b;}
.prev-v{font-size:12px;color:#cbd5e1;}
.prev-total-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid #1e293b;margin-top:4px;}
.prev-total-k{font-size:12px;color:#e2e8f0;font-weight:700;}
.prev-total-v{font-size:14px;font-weight:700;}
.strat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:8px;border:1px solid #1e293b;margin-bottom:5px;cursor:pointer;transition:all .12s;}
.strat-row:hover{border-color:#334155;background:#1e293b;}
.strat-row.selected{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.3);}
.profit-pill{font-size:10px;padding:2px 7px;border-radius:99px;}
.profit-pos{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);}
.profit-neg{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2);}
.sale-box{border-radius:10px;padding:10px;margin-top:4px;}
.sale-box-ok{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);}
.sale-box-bad{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);}
/* Status buttons */
.sts-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:10px;border:1px solid #334155;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;background:transparent;color:#475569;}
.sts-btn:hover{border-color:#64748b;}.sts-s{background:rgba(16,185,129,.1);border-color:#10b981;color:#34d399;}.sts-f{background:rgba(248,113,113,.1);border-color:#f87171;color:#f87171;}
/* Order type toggle */
.ot-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:8px;border:1px solid #334155;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;background:transparent;color:#475569;}
.ot-btn.ot-cust{background:rgba(96,165,250,.1);border-color:#60a5fa;color:#60a5fa;}
.ot-btn.ot-stock{background:rgba(167,139,250,.1);border-color:#a78bfa;color:#a78bfa;}
/* QC */
.qc-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid #334155;font-size:11px;font-family:inherit;cursor:pointer;text-align:left;transition:all .15s;background:transparent;color:#475569;width:100%;}
.qc-btn:hover{border-color:#64748b;color:#94a3b8;}.qc-on{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.4);color:#6ee7b7;}
/* Discount toggle */
.disc-type-btn{flex:1;padding:7px;border-radius:7px;border:1px solid #334155;font-size:11px;font-family:inherit;cursor:pointer;background:transparent;color:#475569;transition:all .15s;font-weight:700;}
.disc-type-btn.on{background:rgba(245,158,11,.1);border-color:#f59e0b;color:#fbbf24;}
/* Material library */
.mat-chip{display:flex;align-items:center;justify-content:space-between;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.mat-chip-info{display:flex;flex-direction:column;gap:2px;}
.mat-chip-name{font-size:12px;color:#e2e8f0;}
.mat-chip-price{font-size:10px;color:#64748b;}
/* Inventory */
.inv-product{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;padding:14px;margin-bottom:10px;}
.inv-stock-num{font-size:28px;font-weight:700;line-height:1;}
.stock-ok{color:#34d399;}.stock-low{color:#fbbf24;}.stock-out{color:#f87171;}
/* Odometer */
.odo-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px;}
@media(min-width:640px){.odo-grid{grid-template-columns:1fr 1fr;}}@media(min-width:1024px){.odo-grid{grid-template-columns:1fr 1fr 1fr;}}
.odo-card{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;padding:16px;}
/* Filters */
.fltr-btn{padding:7px 12px;border-radius:8px;border:1px solid #334155;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;background:transparent;color:#475569;font-family:inherit;transition:all .15s;}
.fltr-btn:hover{border-color:#64748b;color:#94a3b8;}.fltr-btn.on{background:rgba(16,185,129,.1);border-color:#10b981;color:#34d399;}
/* Maint form */
.maint-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;background:rgba(30,41,59,.15);border-bottom:1px solid #1e293b;}
@media(min-width:640px){.maint-grid{grid-template-columns:repeat(3,1fr);}}
/* Settings */
.sett-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}@media(min-width:640px){.sett-grid{grid-template-columns:repeat(3,1fr);}}
.mw2{max-width:700px;display:flex;flex-direction:column;gap:16px;}
/* Expand details */
.exp-det{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px;font-size:11px;}
@media(min-width:640px){.exp-det{grid-template-columns:repeat(4,1fr);}}
.det-hd{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;}
/* Misc */
.warn-box{margin-top:12px;padding:12px;border-radius:8px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);font-size:11px;color:rgba(245,158,11,.7);line-height:1.7;}
.fb-setup{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:16px;margin-bottom:20px;}
.edit-banner{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#93c5fd;display:flex;align-items:center;gap:8px;}
/* Loading & Toast */
.loading{position:fixed;inset:0;z-index:100;background:rgba(2,6,23,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading.gone{display:none;}
.loader{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px;font-size:12px;color:#e2e8f0;display:flex;align-items:center;gap:8px;transition:opacity .3s;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;}
.toast.gone{opacity:0;pointer-events:none;}
/* Sale modal */
.sale-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:520px){.sale-form-grid{grid-template-columns:1fr;}}
/* Sales tab */
.sales-kpi{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(min-width:768px){.sales-kpi{grid-template-columns:repeat(4,1fr);}}
/* Shipping intelligence */
.ship-card{background:#0f172a;border:1px solid rgba(51,65,85,.6);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.ship-card-hdr{padding:12px 16px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;background:rgba(167,139,250,.04);}
.ship-suggest{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#6ee7b7;display:flex;justify-content:space-between;margin:8px 16px 12px;}
/* Sale record row expandable */
.sale-row-exp{background:rgba(15,23,42,.4);font-size:11px;}
/* Combined sales source pill */
.src-pill-order{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.3);font-size:10px;padding:1px 7px;border-radius:99px;}
.src-pill-stock{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.3);font-size:10px;padding:1px 7px;border-radius:99px;}
/* Implied shipping colour */
.ship-pos{color:#34d399;}.ship-neg{color:#fbbf24;}.ship-zero{color:#64748b;}
/* Auth screen */
.auth-screen{position:fixed;inset:0;z-index:200;background:#020617;display:flex;align-items:center;justify-content:center;padding:16px;}
.auth-box{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:32px;width:100%;max-width:380px;}
.auth-title{font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:4px;}
.auth-sub{font-size:12px;color:#475569;margin-bottom:24px;}
.auth-err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#f87171;font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:12px;display:none;}
.auth-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#10b981;color:#020617;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;}
.auth-btn:hover{background:#34d399;}
.auth-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed;}
.auth-btn.google-btn{background:#fff;color:#1f2937;border:1px solid #d1d5db;font-size:13px;}
.auth-btn.google-btn:hover{background:#f3f4f6;}
.auth-screen.gone{display:none;}
.gone { display: none !important; }
</style>
</head>
<body>
<div id="loading" class="loading"><div class="loader"></div><p style="font-size:11px;color:#475569;letter-spacing:.15em;">CONNECTING TO FIREBASE…</p></div>
<div id="toast" class="toast gone"></div>
<div id="root"></div>
<div id="auth-screen" class="auth-screen">
  <div class="auth-box">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div style="background:#10b981;padding:10px;border-radius:10px;display:flex;color:#020617;">

// ─── CALCULATION ENGINE (fixed) ───────────────────────────────
function calc(p,s){
  const w=+p.materialWeight||0,sp=+p.spoolPrice||0,sw=+p.spoolWeight||1000;
  const h=+p.printTimeHours||0,lh=+p.laborHours||0;
  const pk=+(p.packagingCost??s.packagingCost)||0;
  const shipFee=+p.shippingFee||0;      // what YOU pay carrier
  const shipCharge=+p.shippingCharge||0; // what CUSTOMER pays for shipping

  const fil=w*(sp/sw), elec=h*(s.estimatedWatts/1000)*s.kwhRate, wear=h*s.depreciationRate;
  const lab=lh*s.laborRate;
  // Total cost = all real expenses
  const totalCost=fil+elec+wear+lab+pk+shipFee;
  const baseProd=fil+elec+wear; // production cost (for failure tax base)
  const withTax=baseProd*(1+s.failureTax/100);

  // Suggested prices for each strategy
  const strats=STRATS.map(st=>({
    ...st,
    price: parseFloat((withTax*st.mult+lab+pk+shipFee).toFixed(2)),
    get profit(){return parseFloat((this.price+shipCharge-totalCost).toFixed(2));},
    get margin(){return this.price+shipCharge>0?parseFloat(((this.profit/(this.price+shipCharge))*100).toFixed(1)):0;},
  }));

  const selStrat=strats.find(x=>x.key===p.pricingStrategy)||strats[1];

  // Discount calculation
  const discAmt=p.discountType==='percent'
    ? parseFloat((selStrat.price*(+p.discount||0)/100).toFixed(2))
    : (+p.discount||0);
  const suggestedFinal=parseFloat((selStrat.price-discAmt).toFixed(2));

  // Actual sale analysis
  const actual=+p.actualSalePrice||0;
  const revenue=parseFloat((actual+shipCharge-discAmt).toFixed(2));
  const profit=parseFloat((revenue-totalCost).toFixed(2));
  // CORRECT MARGIN: gross profit margin = profit/revenue * 100
  const margin=revenue>0?parseFloat(((profit/revenue)*100).toFixed(1)):0;

  return{fil,elec,wear,lab,pk,shipFee,shipCharge,totalCost,baseProd,withTax,
    strats,selStrat,discAmt,suggestedFinal,actual,revenue,profit,margin};
}

function nextSerial(){return S.prints.length===0?1:Math.max(...S.prints.map(p=>p.serialNumber||0))+1;}
function nextLot(name,ver){return S.prints.filter(p=>p.projectName.trim().toLowerCase()===name.trim().toLowerCase()&&p.fileVersion.trim().toLowerCase()===ver.trim().toLowerCase()).length+1;}

function fmtLot(lot,name,ver){return `LOT-${String(lot).padStart(2,'0')}`;}

// ─── RENDER: INVENTORY ────────────────────────────────────────
function renderInventory(){
  const{prints,stockSales}=S,cv=cu();
  // Group stock prints by (projectName + fileVersion)
  const products={};
  prints.filter(p=>p.orderType==='stock'&&p.status==='success').forEach(p=>{
    const key=`${p.projectName.trim()}|||${p.fileVersion.trim()}`;
    if(!products[key])products[key]={partName:p.projectName,partVersion:p.fileVersion,lots:[],totalQty:0};
    products[key].lots.push({lotNumber:p.lotNumber||1,serialNumber:p.serialNumber||0,date:p.date,qty:+p.quantity||1,id:p.id});
    products[key].totalQty+=+p.quantity||1;
  });
  // Subtract sales
  stockSales.forEach(s=>{
    const key=`${s.partName.trim()}|||${s.partVersion.trim()}`;
    if(products[key])products[key].soldQty=(products[key].soldQty||0)+s.quantity;
  });
  const productList=Object.values(products).map(p=>({...p,soldQty:p.soldQty||0,inStock:p.totalQty-(p.soldQty||0)}));

  // Recent sales
  const recentSales=[...stockSales].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);

  return`<div style="margin-bottom:20px;">
    ${!productList.length?`<div class="card" style="padding:40px;text-align:center;color:#334155;"><p style="margin-bottom:8px;">${ic('box',24)}</p><p>No stock inventory yet.</p><p style="font-size:11px;color:#475569;margin-top:8px;">Log a print job with <b style="color:#a78bfa;">For Stock / Inventory</b> order type to start tracking.</p></div>`
    :productList.map(prod=>{
      const stockColor=prod.inStock>5?'#34d399':prod.inStock>0?'#fbbf24':'#f87171';
      const lots=[...prod.lots].sort((a,b)=>a.lotNumber-b.lotNumber);
      return`<div class="inv-product">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
          <div>
            <p style="font-size:14px;font-weight:700;color:#e2e8f0;">${esc(prod.partName)}</p>
            <p style="font-size:11px;color:#64748b;margin-top:2px;">${esc(prod.partVersion)} &nbsp;·&nbsp; ${lots.length} lot${lots.length!==1?'s':''}</p>
          </div>
          <div style="text-align:right;">
            <p class="inv-stock-num" style="color:${stockColor};">${prod.inStock}</p>
            <p style="font-size:10px;color:#64748b;">in stock</p>
          </div>
        </div>
        <div style="display:flex;gap:16px;margin-bottom:12px;">
          <div style="text-align:center;"><p style="font-size:18px;font-weight:700;color:#60a5fa;">${prod.totalQty}</p><p style="font-size:10px;color:#64748b;">total printed</p></div>
          <div style="text-align:center;"><p style="font-size:18px;font-weight:700;color:#a78bfa;">${prod.soldQty}</p><p style="font-size:10px;color:#64748b;">sold</p></div>
          <div style="text-align:center;"><p style="font-size:18px;font-weight:700;color:${stockColor};">${prod.inStock}</p><p style="font-size:10px;color:#64748b;">available</p></div>
        </div>
        <div style="margin-bottom:10px;">
          <p style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">Lots</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${lots.map(l=>`<span style="background:#1e293b;border:1px solid #334155;border-radius:6px;padding:4px 10px;font-size:11px;color:#94a3b8;">${fmtLot(l.lotNumber)} &nbsp;<span style="color:#475569;">${l.date} · ${l.qty}pc</span></span>`).join('')}
          </div>
        </div>
        ${prod.inStock>0?`<button class="btn btn-em btn-sm" onclick="recordSale('${esc(prod.partName)}','${esc(prod.partVersion)}')">${ic('tag',11)} Record Sale</button>`:'<span style="font-size:11px;color:#f87171;">Out of stock</span>'}
      </div>`;
    }).join('')}
  </div>
  ${recentSales.length>0?`<div class="card">
    <div class="sec-hdr"><p class="sec-ttl">Stock Sale History</p></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Date</th><th>Part</th><th>Customer</th><th>Contact</th><th>Qty</th><th>Unit Price</th><th>Final Paid</th><th>Implied Ship</th><th>Carrier Cost</th><th>Ship P&L</th><th></th></tr></thead>
      <tbody>${recentSales.map(s=>{
        const unitP=+s.pricePerUnit||+s.salePrice||0;
        const subtotal=unitP*(+s.quantity||1);
        const final=+s.finalAmount||subtotal;
        const implied=final-subtotal;
        const carrier=+s.actualShippingCost||0;
        const shipPnl=implied-carrier;
        const sc=implied>0?'ship-pos':implied<0?'ship-neg':'ship-zero';
        return`<tr>
          <td style="color:#64748b;white-space:nowrap;">${s.date}</td>
          <td style="color:#e2e8f0;">${esc(s.partName)} <span style="color:#64748b;font-size:10px;">${esc(s.partVersion||'')}</span></td>
          <td style="color:#94a3b8;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.customerName)||'—'}</td>
          <td style="color:#60a5fa;font-size:10px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.customerContact)||'—'}</td>
          <td style="color:#60a5fa;text-align:right;">${s.quantity}</td>
          <td style="color:#94a3b8;">${unitP?`${cv}${unitP}`:'—'}</td>
          <td style="color:#e2e8f0;font-weight:700;">${cv}${final.toFixed(0)}</td>
          <td class="${sc}">${implied>0?'+':''}${cv}${implied.toFixed(0)}</td>
          <td style="color:#94a3b8;">${carrier>0?`${cv}${carrier.toFixed(0)}`:'—'}</td>
          <td style="color:${shipPnl>=0?'#34d399':'#f87171'};font-weight:700;">${shipPnl>=0?'+':''}${cv}${shipPnl.toFixed(0)}</td>
          <td style="white-space:nowrap;">
            <button class="btn-ico edit" onclick="openSaleModal(${s.id})" title="Edit">${ic('edit',13)}</button>
            <button class="btn-ico del" onclick="delSale(${s.id})" title="Delete">${ic('trash',13)}</button>
          </td>
        </tr>`;}).join('')}</tbody>
    </table></div>
  </div>`:''}`; 
}

// ─── RENDER: MAINTENANCE ──────────────────────────────────────
function renderMaintenance(){
  const{prints,maintenance,settings,showMF,mf}=S,cv=cu();
  const odos=settings.printers.map(pr=>{const hrs=prints.filter(p=>p.printerName===pr).reduce((a,p)=>a+(+p.printTimeHours||0),0);const jobs=prints.filter(p=>p.printerName===pr).length;const fail=prints.filter(p=>p.printerName===pr&&p.status==='failure').length;const last=maintenance.filter(m=>m.printerName===pr).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];return{pr,hrs,jobs,fail,last};}).filter(o=>o.jobs>0||o.last);
  const sorted=[...maintenance].sort((a,b)=>new Date(b.date)-new Date(a.date));
  return`
    <div class="odo-grid">
      ${!odos.length?`<div class="odo-card" style="grid-column:1/-1;text-align:center;color:#334155;padding:32px;">Log your first print to see printer odometers.</div>`
      :odos.map(o=>`<div class="odo-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;"><div style="min-width:0;"><p class="lbl">Printer Odometer</p><p style="font-size:13px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(o.pr)}</p></div><span style="color:#334155;flex-shrink:0;margin-left:8px;">${ic('printer',15)}</span></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;text-align:center;"><div><p style="font-size:20px;font-weight:700;color:#34d399;">${o.hrs.toFixed(1)}</p><p class="lbl" style="text-align:center;">Hours</p></div><div><p style="font-size:20px;font-weight:700;color:#60a5fa;">${o.jobs}</p><p class="lbl" style="text-align:center;">Jobs</p></div><div><p style="font-size:20px;font-weight:700;color:#f87171;">${o.fail}</p><p class="lbl" style="text-align:center;">Fails</p></div></div><div style="border-top:1px solid #1e293b;padding-top:10px;font-size:10px;color:#475569;">${o.last?`Last: <span style="color:#94a3b8;">${esc(o.last.type)}</span> — ${o.last.date}`:'No maintenance yet'}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="sec-hdr"><p class="sec-ttl">Maintenance Log</p><button class="btn ${showMF?'btn-out':'btn-em'}" onclick="toggleMF()">${showMF?`${ic('x',11)} Cancel`:`${ic('plus',11)} Log Service`}</button></div>
      ${showMF?`<div class="maint-grid">
        ${lbl('Printer',`<select id="mf-printerName" class="inp"><option value="">Select printer</option>${settings.printers.map(p=>`<option value="${esc(p)}" ${p===mf.printerName?'selected':''}>${esc(p)}</option>`).join('')}</select>`)}
        ${lbl('Service Type',`<select id="mf-type" class="inp"><option value="">Select type</option>${MAINT_T.map(t=>`<option value="${esc(t)}" ${t===mf.type?'selected':''}>${esc(t)}</option>`).join('')}</select>`)}
        ${lbl('Date',`<input id="mf-date" class="inp" type="date" value="${mf.date}">`)}
        ${lbl(`Part Cost (${cv})`,`<input id="mf-partCost" class="inp" type="number" value="${mf.partCost}">`)}
        <div style="grid-column:1/-1;">${lbl('Notes',`<input id="mf-notes" class="inp" placeholder="e.g. 0.4mm steel nozzle at 600h" value="${esc(mf.notes)}">`)}</div>
        <div style="grid-column:1/-1;"><button class="btn btn-em" style="width:100%;padding:10px;border-radius:10px;justify-content:center;" onclick="saveMaint()">Save Maintenance Record</button></div>
      </div>`:''}
      <div class="tbl-wrap"><table>
        <thead><tr><th>Date</th><th>Printer</th><th>Service</th><th>Part Cost</th><th>Notes</th><th></th></tr></thead>
        <tbody>${!sorted.length?`<tr><td colspan="6" style="text-align:center;color:#334155;padding:40px;">No maintenance records yet.</td></tr>`
        :sorted.map(m=>`<tr><td style="color:#64748b;">${m.date}</td><td style="color:#e2e8f0;">${esc(m.printerName)}</td><td><span class="bdg bdg-d">${esc(m.type)||'—'}</span></td><td style="color:#fbbf24;">${+m.partCost>0?`${cv}${m.partCost}`:'—'}</td><td style="color:#64748b;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.notes)||'—'}</td><td><button class="btn-ico del" onclick="delMaint(${m.id})">${ic('trash',12)}</button></td></tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
}

function renderSaleModal(){
  if(!S.showSaleModal)return'';
  const f=S.saleForm, cv=cu(), isEdit=!!S.editSaleId;
  const unitP=+f.pricePerUnit||0, qty=+f.quantity||1, final=+f.finalAmount||0;
  const subtotal=unitP*qty;
  const implied=final>0?final-subtotal:0;
  const carrier=+f.actualShippingCost||0;
  const shipPnl=implied-carrier;
  const sf=(id,label,type='text',val='',ph='')=>lbl(label,`<input id="sf-${id}" class="inp" type="${type}" value="${esc(val)}" placeholder="${esc(ph)}" oninput="S.saleForm['${id}']=this.value;rerenderSaleCalc()">`);

  return`<div class="modal-bg" onclick="if(event.target===this)closeSaleModal()">
    <div class="modal-box" style="max-width:640px;" onclick="event.stopPropagation()">
      <div class="modal-hdr">
        <div class="modal-title"><span class="pulse ${isEdit?'edit-pulse':''}"></span>${isEdit?'Edit Sale Record':'Record New Sale'}</div>
        <button class="btn-ico" onclick="closeSaleModal()" style="color:#64748b;">${ic('x',15)}</button>
      </div>
      <div style="overflow-y:auto;flex:1;padding:16px;" class="modal-scroll">
        ${isEdit?`<div class="edit-banner">${ic('edit',12)} Editing sale record from ${f.date}</div>`:''}

        <div class="div-label">Product Info</div>
        <div class="sale-form-grid">
          ${sf('partName','Part / Project Name','text',f.partName,'e.g. Vase Design')}
          ${sf('partVersion','Version','text',f.partVersion,'v1.0')}
        </div>
        <div class="sale-form-grid">
          ${sf('date','Sale Date','date',f.date)}
          ${sf('quantity','Quantity Sold','number',f.quantity)}
        </div>

        <div class="div-label">Customer Info</div>
        <div class="sale-form-grid">
          ${sf('customerName','Customer Name','text',f.customerName,'Name or order ref')}
          ${sf('customerContact','Contact (Phone / Line / IG / FB)','text',f.customerContact,'e.g. 08x-xxx-xxxx or @handle')}
        </div>

        <div class="div-label">Pricing — Real Final Numbers</div>
        <div class="sale-form-grid">
          ${sf('pricePerUnit',`Unit Price (${cv}) agreed`,  'number',f.pricePerUnit,`e.g. 79`)}
          ${sf('finalAmount', `Final Amount Customer Paid (${cv}) ← total cash received`, 'number',f.finalAmount,`e.g. 189 for 2 units`)}
        </div>

        <!-- Live implied shipping calculation -->
        <div id="sale-calc" style="margin-bottom:12px;">${renderSaleCalcPreview(f,cv)}</div>

        <div class="div-label">Your Costs for This Shipment</div>
        <div class="sale-form-grid">
          ${sf('actualShippingCost',`Carrier Shipping Cost (${cv}) — you paid`,'number',f.actualShippingCost,'e.g. 28')}
          ${sf('packagingCost',`Packaging Cost (${cv})`, 'number',f.packagingCost,'e.g. 20')}
        </div>
        ${lbl('Notes',`<textarea id="sf-notes" class="inp" rows="2" placeholder="Special requests, discount reason, platform…" oninput="S.saleForm.notes=this.value">${esc(f.notes)}</textarea>`)}
      </div>
      <div class="modal-ftr">
        <button class="m-cancel" onclick="closeSaleModal()">Cancel</button>
        <button class="${isEdit?'m-save edit-save':'m-save'}" onclick="saveSale()">${ic('save',13)} ${isEdit?'Update Record':'Save Sale'}</button>
      </div>
    </div>
  </div>`;
}

function renderSaleCalcPreview(f,cv){
  const unitP=+f.pricePerUnit||0, qty=+f.quantity||1, final=+f.finalAmount||0;
  const subtotal=parseFloat((unitP*qty).toFixed(2));
  const implied=final>0?parseFloat((final-subtotal).toFixed(2)):null;
  const carrier=+f.actualShippingCost||0;
  const pkg=+f.packagingCost||0;
  const shipPnl=implied!==null?parseFloat((implied-carrier).toFixed(2)):null;
  if(!unitP&&!final) return '';
  return`<div style="background:#1e293b;border-radius:10px;padding:12px;font-size:12px;">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-bottom:8px;">
      <div><p style="color:#64748b;font-size:10px;margin-bottom:2px;">Product Subtotal</p><p style="color:#60a5fa;font-weight:700;">${cv}${subtotal.toFixed(0)}</p><p style="font-size:10px;color:#475569;">${qty} × ${cv}${unitP}</p></div>
      <div><p style="color:#64748b;font-size:10px;margin-bottom:2px;">Final Paid</p><p style="color:#e2e8f0;font-weight:700;">${final>0?cv+final.toFixed(0):'?'}</p></div>
      <div><p style="color:#64748b;font-size:10px;margin-bottom:2px;">Implied Shipping</p>
        ${implied!==null?`<p style="color:${implied>0?'#34d399':implied<0?'#fbbf24':'#64748b'};font-weight:700;">${implied>0?'+':''}${cv}${implied.toFixed(0)}</p><p style="font-size:10px;color:#475569;">${implied<0?'Discount given':implied===0?'No shipping':'Customer paid shipping'}</p>`:'<p style="color:#475569;">Enter final amount</p>'}
      </div>
    </div>
    ${implied!==null&&carrier>0?`<div style="border-top:1px solid #334155;padding-top:8px;display:flex;justify-content:space-between;align-items:center;">
      <span style="color:#64748b;">Shipping P&amp;L: collected ${cv}${implied.toFixed(0)} − carrier ${cv}${carrier.toFixed(0)}</span>
      <span style="font-weight:700;color:${shipPnl>=0?'#34d399':'#f87171'};">${shipPnl>=0?'+':''}${cv}${shipPnl.toFixed(0)}</span>
    </div>`:''}
  </div>`;
}

function rerenderSaleCalc(){
  const el=document.getElementById('sale-calc');
  if(!el)return;
  // sync from DOM
  ['quantity','pricePerUnit','finalAmount','actualShippingCost','packagingCost']
    .forEach(k=>{const d=document.getElementById('sf-'+k);if(d)S.saleForm[k]=d.value;});
  el.innerHTML=renderSaleCalcPreview(S.saleForm,cu());
}

// ─── RENDER: SALES TAB ────────────────────────────────────────
function renderSales(){
  const {prints,stockSales,settings}=S, cv=cu();

  // Normalise ALL sales into one array
  const allSales=[];

  // From stock sales
  stockSales.forEach(s=>{
    const unitP=+s.pricePerUnit||+s.salePrice||0;
    const qty=+s.quantity||1;
    const subtotal=unitP*qty;
    const final=+s.finalAmount||subtotal;
    const impliedShip=final-subtotal;
    const carrier=+s.actualShippingCost||0;
    const pkg=+s.packagingCost||0;
    allSales.push({id:s.id,type:'stock',date:s.date,product:s.partName,version:s.partVersion,
      customer:s.customerName,contact:s.customerContact,qty,unitP,subtotal,final,
      impliedShip,carrier,pkg,revenue:final,cost:carrier+pkg,profit:final-carrier-pkg,
      notes:s.notes});
  });

  // From print orders with actual sale price
  prints.filter(p=>p.actualSalePrice&&p.orderType!=='stock').forEach(p=>{
    const c=calc(p,settings);
    allSales.push({id:p.id,type:'order',date:p.date,product:p.projectName,version:p.fileVersion,
      customer:p.customerName,contact:'',qty:+p.quantity||1,
      unitP:+p.actualSalePrice||0,subtotal:+p.actualSalePrice||0,
      final:c.revenue,impliedShip:+p.shippingCharge||0,
      carrier:+p.shippingFee||0,pkg:+p.packagingCost||0,
      revenue:c.revenue,cost:c.totalCost,profit:c.profit,margin:c.margin,
      serial:p.serialNumber,notes:p.notes});
  });

  allSales.sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Apply filter and search
  const {salesFilter,salesSearch}=S;
  const filtered=allSales
    .filter(s=>salesFilter==='all'||s.type===salesFilter)
    .filter(s=>!salesSearch||[s.product,s.version,s.customer,s.contact,s.notes].join(' ').toLowerCase().includes(salesSearch.toLowerCase()));

  // KPIs
  const totalRevenue=allSales.reduce((a,s)=>a+s.revenue,0);
  const totalCost=allSales.reduce((a,s)=>a+s.cost,0);
  const totalProfit=allSales.reduce((a,s)=>a+s.profit,0);
  const avgMargin=totalRevenue>0?(totalProfit/totalRevenue*100):0;

  // ── SHIPPING INTELLIGENCE ────────────────────────────────────
  // Group by (product × version × qty)
  const shipMap={};
  allSales.forEach(s=>{
    if(s.impliedShip===0&&s.carrier===0)return; // skip if no shipping data
    const key=`${s.product}|||${s.version}|||${s.qty}`;
    if(!shipMap[key])shipMap[key]={product:s.product,version:s.version,qty:s.qty,rows:[]};
    shipMap[key].rows.push(s);
  });
  const shipGroups=Object.values(shipMap)
    .filter(g=>g.rows.length>0)
    .sort((a,b)=>a.product.localeCompare(b.product)||a.qty-b.qty);

  return`
    <!-- KPI row -->
    <div class="sales-kpi">
      ${[
        {l:'Total Revenue',v:`${cv}${totalRevenue.toFixed(0)}`,c:'#60a5fa'},
        {l:'Total Profit',v:`${cv}${totalProfit.toFixed(0)}`,c:totalProfit>=0?'#34d399':'#f87171'},
        {l:'Sales Count',v:allSales.length,c:'#94a3b8'},
        {l:'Avg Margin',v:`${avgMargin.toFixed(1)}%`,c:avgMargin>=0?'#34d399':'#f87171'},
      ].map(k=>`<div class="kpi"><div><p class="kpi-lbl">${k.l}</p><p class="kpi-val" style="color:${k.c};">${k.v}</p></div></div>`).join('')}
    </div>

    <!-- All Sales Table -->
    <div class="card" style="margin-bottom:20px;">
      <div class="sec-hdr" style="flex-wrap:wrap;gap:8px;">
        <p class="sec-ttl">All Sales</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          ${['all','order','stock'].map(f=>`<button class="fltr-btn ${salesFilter===f?'on':''}" onclick="setSalesFilter('${f}')">${f==='all'?'All':f==='order'?'Customer Orders':'Stock Sales'}</button>`).join('')}
          <button class="btn btn-em btn-sm" onclick="openSaleModal()">${ic('plus',11)} Add Stock Sale</button>
        </div>
      </div>
      <div style="padding:8px 16px 0;"><input class="inp" placeholder="Search product, customer, contact…" oninput="setSalesSearch(this.value)" value="${esc(salesSearch)}" style="margin-bottom:8px;"></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Date</th><th>Type</th><th>Product</th><th>Customer</th><th>Contact</th><th>Qty</th><th>Final Paid</th><th>Cost</th><th>Profit</th><th>Margin</th><th>Ship Recv</th><th></th></tr></thead>
        <tbody>${!filtered.length
          ?`<tr><td colspan="12" style="text-align:center;color:#334155;padding:32px;">No sales records yet.</td></tr>`
          :filtered.map(s=>{
            const margin=s.revenue>0?((s.profit/s.revenue)*100).toFixed(1):0;
            return`<tr class="tr-c ${S.salesExpanded===s.id?'exp':''}" onclick="toggleSalesExpand(${JSON.stringify(s.id)})">
              <td style="color:#64748b;white-space:nowrap;">${s.date}</td>
              <td><span class="src-pill-${s.type}">${s.type==='order'?'Order':'Stock'}</span></td>
              <td style="color:#e2e8f0;font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.product)} <span style="color:#64748b;font-size:10px;">${esc(s.version)}</span></td>
              <td style="color:#94a3b8;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.customer)||'—'}</td>
              <td style="color:#60a5fa;font-size:11px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.contact)||'—'}</td>
              <td style="color:#60a5fa;text-align:right;">${s.qty}</td>
              <td style="color:#e2e8f0;font-weight:700;">${cv}${s.final.toFixed(0)}</td>
              <td style="color:#f87171;">${cv}${s.cost.toFixed(0)}</td>
              <td style="color:${s.profit>=0?'#34d399':'#f87171'};font-weight:700;">${s.profit>=0?'+':''}${cv}${s.profit.toFixed(0)}</td>
              <td style="color:${+margin>=0?'#34d399':'#f87171'};">${s.revenue>0?margin+'%':'—'}</td>
              <td style="color:${s.impliedShip>0?'#34d399':s.impliedShip<0?'#fbbf24':'#334155'};">${s.impliedShip!==0?`${s.impliedShip>0?'+':''}${cv}${s.impliedShip.toFixed(0)}`:'—'}</td>
              <td style="white-space:nowrap;">
                ${s.type==='stock'?`<button class="btn-ico edit" onclick="event.stopPropagation();openSaleModal(${s.id})" title="Edit">${ic('edit',13)}</button><button class="btn-ico del" onclick="event.stopPropagation();delSale(${s.id})" title="Delete">${ic('trash',13)}</button>`
                :`<button class="btn-ico edit" onclick="event.stopPropagation();openModal(${s.id})" title="Edit print record">${ic('edit',13)}</button>`}
              </td>
            </tr>
            ${S.salesExpanded===s.id?`<tr class="sale-row-exp"><td colspan="12"><div style="padding:12px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;font-size:11px;">
              <div><p style="color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;font-size:10px;">Sale Breakdown</p>
                <p style="color:#94a3b8;margin-bottom:3px;">Unit Price: <span style="color:#cbd5e1;">${s.unitP?`${cv}${s.unitP}`:'—'}</span></p>
                <p style="color:#94a3b8;margin-bottom:3px;">Subtotal: <span style="color:#60a5fa;">${cv}${s.subtotal.toFixed(0)}</span></p>
                <p style="color:#94a3b8;margin-bottom:3px;">Final Paid: <span style="color:#e2e8f0;font-weight:700;">${cv}${s.final.toFixed(0)}</span></p>
                ${s.impliedShip!==0?`<p style="color:#94a3b8;margin-bottom:3px;">Implied Ship: <span style="color:${s.impliedShip>0?'#34d399':'#fbbf24'};">${s.impliedShip>0?'+':''}${cv}${s.impliedShip.toFixed(0)}</span></p>`:''}
              </div>
              <div><p style="color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;font-size:10px;">Costs</p>
                <p style="color:#94a3b8;margin-bottom:3px;">Carrier: <span style="color:#cbd5e1;">${s.carrier>0?`${cv}${s.carrier.toFixed(0)}`:'—'}</span></p>
                <p style="color:#94a3b8;margin-bottom:3px;">Packaging: <span style="color:#cbd5e1;">${s.pkg>0?`${cv}${s.pkg.toFixed(0)}`:'—'}</span></p>
                <p style="color:#94a3b8;margin-bottom:3px;">Total Cost: <span style="color:#f87171;">${cv}${s.cost.toFixed(0)}</span></p>
                ${s.carrier>0&&s.impliedShip!==0?`<p style="color:#94a3b8;">Ship P&L: <span style="color:${(s.impliedShip-s.carrier)>=0?'#34d399':'#f87171'};">${(s.impliedShip-s.carrier)>=0?'+':''}${cv}${(s.impliedShip-s.carrier).toFixed(0)}</span></p>`:''}
              </div>
              <div><p style="color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;font-size:10px;">Notes</p>
                <p style="color:#64748b;font-style:italic;">${esc(s.notes)||'No notes'}</p>
              </div>
            </div></td></tr>` : ''}`;
          }).join('')}
        </tbody>
      </table></div>
    </div>

    <!-- Shipping Intelligence -->
    ${shipGroups.length===0?'':`<div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:12px 16px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px;">
        ${ic('trending',14)}
        <p class="sec-ttl" style="color:#a78bfa;">Shipping Intelligence — Average by Product × Quantity</p>
      </div>
      <div style="padding:12px 16px 0;font-size:11px;color:#64748b;margin-bottom:4px;">
        Based on real sale data. <b style="color:#a78bfa;">Implied shipping</b> = final paid − product subtotal. Use these averages when quoting future orders.
      </div>
      ${(()=>{
        // Group by product+version first for headers
        const byProduct={};
        shipGroups.forEach(g=>{
          const pk=`${g.product}|||${g.version}`;
          if(!byProduct[pk])byProduct[pk]={product:g.product,version:g.version,groups:[]};
          byProduct[pk].groups.push(g);
        });
        return Object.values(byProduct).map(p=>{
          const rows=p.groups.map(g=>{
            const n=g.rows.length;
            const avgImplied=g.rows.reduce((a,r)=>a+r.impliedShip,0)/n;
            const avgCarrier=g.rows.reduce((a,r)=>a+r.carrier,0)/n;
            const avgFinal=g.rows.reduce((a,r)=>a+r.final,0)/n;
            const avgUnitP=g.rows.reduce((a,r)=>a+r.unitP,0)/n;
            const avgSubtotal=avgUnitP*g.qty;
            const avgShipPnl=avgImplied-avgCarrier;
            const sc=avgImplied>0?'#34d399':avgImplied<0?'#fbbf24':'#64748b';
            return{qty:g.qty,n,avgUnitP,avgSubtotal,avgFinal,avgImplied,avgCarrier,avgShipPnl,sc};
          });
          const bestImplied=rows.length>0?Math.max(...rows.map(r=>r.avgImplied)):0;
          return`<div class="ship-card">
            <div class="ship-card-hdr">
              <div>
                <span style="font-size:13px;font-weight:700;color:#e2e8f0;">${esc(p.product)}</span>
                <span style="color:#64748b;margin-left:8px;font-size:11px;">${esc(p.version)}</span>
              </div>
              <span class="lot-tag">${rows.reduce((a,r)=>a+r.n,0)} transactions</span>
            </div>
            <div class="tbl-wrap"><table>
              <thead><tr>
                <th>Qty</th><th>Avg Unit Price</th><th>Avg Subtotal</th><th>Avg Final Paid</th>
                <th>Avg Implied Ship</th><th>Avg Carrier Cost</th><th>Avg Ship P&L</th><th>Count</th>
              </tr></thead>
              <tbody>${rows.map(r=>`<tr>
                <td style="color:#60a5fa;font-weight:700;">×${r.qty}</td>
                <td style="color:#94a3b8;">${cv}${r.avgUnitP.toFixed(0)}</td>
                <td style="color:#64748b;">${cv}${r.avgSubtotal.toFixed(0)}</td>
                <td style="color:#e2e8f0;font-weight:700;">${cv}${r.avgFinal.toFixed(0)}</td>
                <td style="color:${r.sc};font-weight:700;">${r.avgImplied>0?'+':''}${cv}${r.avgImplied.toFixed(0)}</td>
                <td style="color:#94a3b8;">${r.avgCarrier>0?`${cv}${r.avgCarrier.toFixed(0)}`:'—'}</td>
                <td style="color:${r.avgShipPnl>=0?'#34d399':'#f87171'};font-weight:700;">${r.avgShipPnl>=0?'+':''}${cv}${r.avgShipPnl.toFixed(0)}</td>
                <td style="color:#475569;">${r.n} sale${r.n!==1?'s':''}</td>
              </tr>`).join('')}</tbody>
            </table></div>
            ${bestImplied>0?`<div class="ship-suggest">
              <span>💡 Suggested shipping to quote for this product: <b style="color:#10b981;">${cv}${Math.ceil(bestImplied/5)*5}</b> (rounded up from avg ${cv}${bestImplied.toFixed(0)})</span>
            </div>`:''}
          </div>`;
        }).join('');
      })()}
    </div>`}
  `;
}
function renderModal(){
  if(!S.showModal)return'';
  const isEdit=!!S.editId;
  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="modal-title"><span class="pulse ${isEdit?'edit-pulse':''}"></span>${isEdit?'Edit Print Record':'New Print Job'}</div>
      <button class="btn-ico" onclick="closeModal()" style="color:#64748b;">${ic('x',15)}</button>
    </div>
    <div class="modal-layout">
      <div class="modal-main"><div id="modal-content">${renderModalContent()}</div></div>
      <div class="modal-side" style="padding:16px;"><div id="preview-panel">${renderPreview(S.form,S.settings)}</div></div>
    </div>
    <div class="mob-bar"><div id="mob-bar-inner"></div></div>
    <div class="modal-ftr">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="${isEdit?'m-save edit-save':'m-save'}" onclick="savePrint()">${ic('save',13)} ${isEdit?'Update Record':'Save Print Job'}</button>
    </div>
  </div></div>`;
}

// ─── RENDER: FULL APP ─────────────────────────────────────────
const TABS=[
  {k:'dashboard',  l:'Dashboard', ico:'grid'},
  {k:'log',        l:'Log',       ico:'log'},
  {k:'inventory',  l:'Stock',     ico:'box'},
  {k:'sales',      l:'Sales',     ico:'trending'},
  {k:'maintenance',l:'Service',   ico:'wrench'},
  {k:'settings',   l:'Settings',  ico:'cog'},
];

function render(){
  const t=S.tab;
  const isConfigured=FB.apiKey!=='PASTE_API_KEY_HERE';
  const dotCls='dot sdot '+(fbLive?'live':isConfigured?'warn':'');
  document.getElementById('root').innerHTML=`
    <header class="hdr"><div class="wrap">
      <div class="hdr-row">
        <div class="logo"><div class="logo-ico">${ic('layers',15)}</div><div><div class="logo-t">PrintOps ERP</div><div class="logo-s">3D Print Management</div></div></div>
        <div class="hdr-acts">
          <div class="sync-badge">${ic('wifi',11)}<span class="${dotCls}"></span><span class="hide-sm">${fbLive?'Live':'Local'}</span></div>
          <button class="btn btn-out" style="padding:6px 10px;" onclick="exportCSV()">${ic('download',12)}<span class="hide-sm"> CSV</span></button>
          <button class="btn btn-em" onclick="openModal()">${ic('plus',12)}<span class="hide-sm"> New Print</span></button>
        </div>
      </div>
      <div class="tab-nav">${TABS.map(x=>`<button class="tab-btn ${t===x.k?'on':''}" onclick="setTab('${x.k}')">${ic(x.ico,13)} ${x.l}</button>`).join('')}</div>
    </div></header>
    <main class="main">
      ${t==='dashboard'   ?renderDashboard()   :''}
      ${t==='log'         ?renderLog()         :''}
      ${t==='inventory'   ?renderInventory()   :''}
      ${t==='sales'       ?renderSales()       :''}
      ${t==='maintenance' ?renderMaintenance() :''}
      ${t==='settings'    ?renderSettings()    :''}
    </main>
    <nav class="mob-nav">${TABS.map(x=>`<button class="mob-btn ${t===x.k?'on':''}" onclick="setTab('${x.k}')">${ic(x.ico,18)}<span>${x.l}</span></button>`).join('')}</nav>
    ${renderModal()}
    ${renderSaleModal()}`;
  if(S.showModal)refreshPrev();
}

// ─── INIT ─────────────────────────────────────────────────────
hydrate();
render();
fbInit();
</script>
</body>
</html>
